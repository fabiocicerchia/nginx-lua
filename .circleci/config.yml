# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/2.0/configuration-reference
version: 2.1

# Orbs are reusable packages of CircleCI configuration that you may share across projects, enabling you to create encapsulated, parameterized commands, jobs, and executors that can be used across multiple projects.
# See: https://circleci.com/docs/2.0/orb-intro/
orbs:
  # https://circleci.com/developer/orbs/orb/circleci/docker
  # Pinned to exact version for supply chain security (NIS2 Article 21)
  node: circleci/docker@2.4.0

# Invoke jobs via workflows
# See: https://circleci.com/docs/2.0/configuration-reference/#workflows
workflows:
  nightly:
    triggers:
      - schedule:
          cron: "0 0 * * *"
          filters:
            branches:
              only:
                - main
    jobs:
      - Release

  builds:
    jobs:
      - Docker AMD:
          name: Docker AMD << matrix.distro >>
          matrix:
            parameters:
              distro:
                [
                  "almalinux",
                  "alpine",
                  "amazonlinux",
                  "debian",
                  "fedora",
                  "ubuntu",
                ]
          filters:
            tags:
              ignore: /.*/
      - Docker ARM:
          name: Docker ARM << matrix.distro >>
          matrix:
            parameters:
              distro:
                [
                  "almalinux",
                  "alpine",
                  "amazonlinux",
                  "debian",
                  "fedora",
                  "ubuntu",
                ]
          filters:
            tags:
              ignore: /.*/
      - Package AMD:
          name: Package AMD << matrix.distro >>
          requires:
            - Docker AMD << matrix.distro >>
          matrix:
            parameters:
              distro:
                [
                  "almalinux",
                  "alpine",
                  "amazonlinux",
                  "debian",
                  "fedora",
                  "ubuntu",
                ]
          filters:
            tags:
              ignore: /.*/
      - Package ARM:
          name: Package ARM << matrix.distro >>
          requires:
            - Docker ARM << matrix.distro >>
          matrix:
            parameters:
              distro:
                [
                  "almalinux",
                  "alpine",
                  "amazonlinux",
                  "debian",
                  "fedora",
                  "ubuntu",
                ]
          filters:
            tags:
              ignore: /.*/
      - Docker Bundle:
          name: Docker Bundle << matrix.distro >>
          requires:
            - Package AMD << matrix.distro >>
            - Package ARM << matrix.distro >>
          matrix:
            parameters:
              distro:
                [
                  "almalinux",
                  "alpine",
                  "amazonlinux",
                  "debian",
                  "fedora",
                  "ubuntu",
                ]
          filters:
            branches:
              only: main
      - Metadata:
          requires:
            - Docker Bundle
          filters:
            branches:
              only: main
      - Release:
          requires:
            - Metadata
          filters:
            branches:
              only: main

commands:
  docker:
    parameters:
      distro:
        type: string
    steps:
      - checkout

      - restore_cache:
          keys:
            - mmdb-geoip2

      - run:
          name: check docker
          command: |
            docker --version
            # seccomp
            # https://wiki.alpinelinux.org/wiki/Release_Notes_for_Alpine_3.14.0#faccessat2
            sudo apt-get install -y --no-install-recommends libseccomp2
            echo "libseccomp2 version: $(dpkg -s libseccomp2 | grep '^Version:')"

      - run:
          name: Install Python Dependencies
          command: pip3 install -r bin/requirements.txt

      - run:
          name: Install Trivy (vulnerability scanner)
          command: |
            set -euo pipefail
            TRIVY_ARCHIVE="trivy_${TRIVY_VERSION#v}_Linux-$(dpkg --print-architecture | sed 's/amd64/64bit/' | sed 's/arm64/ARM64/').tar.gz"
            TRIVY_CHECKSUMS="trivy_${TRIVY_VERSION#v}_checksums.txt"
            ./bin/download-and-verify.sh "https://github.com/aquasecurity/trivy/releases/download/${TRIVY_VERSION}/${TRIVY_CHECKSUMS}" "/tmp/${TRIVY_CHECKSUMS}"
            EXPECTED_SHA256=$(grep "${TRIVY_ARCHIVE}" "/tmp/${TRIVY_CHECKSUMS}" | awk '{print $1}')
            ./bin/download-and-verify.sh "https://github.com/aquasecurity/trivy/releases/download/${TRIVY_VERSION}/${TRIVY_ARCHIVE}" "/tmp/${TRIVY_ARCHIVE}" "${EXPECTED_SHA256}"
            tar xzf "/tmp/${TRIVY_ARCHIVE}" trivy
            sudo mv trivy /usr/local/bin/trivy
            rm -f "/tmp/${TRIVY_ARCHIVE}" "/tmp/${TRIVY_CHECKSUMS}"
            trivy --version
          environment:
            TRIVY_VERSION: "v0.69.3"

      - run:
          name: Install Cosign (image signing)
          command: |
            set -euo pipefail
            COSIGN_BINARY="cosign-linux-$(dpkg --print-architecture)"
            ./bin/download-and-verify.sh "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign_checksums.txt" "/tmp/cosign_checksums.txt"
            EXPECTED_SHA256=$(grep "${COSIGN_BINARY}$" "/tmp/cosign_checksums.txt" | awk '{print $1}')
            ./bin/download-and-verify.sh "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/${COSIGN_BINARY}" "/tmp/${COSIGN_BINARY}" "${EXPECTED_SHA256}"
            chmod +x "/tmp/${COSIGN_BINARY}"
            sudo mv "/tmp/${COSIGN_BINARY}" /usr/local/bin/cosign
            rm -f /tmp/cosign_checksums.txt
            cosign version
          environment:
            COSIGN_VERSION: "v3.0.5"

      - run:
          name: Install Syft (SBOM generator)
          command: |
            set -euo pipefail
            SYFT_ARCHIVE="syft_${SYFT_VERSION#v}_linux_$(dpkg --print-architecture).tar.gz"
            SYFT_CHECKSUMS="syft_${SYFT_VERSION#v}_checksums.txt"
            ./bin/download-and-verify.sh "https://github.com/anchore/syft/releases/download/${SYFT_VERSION}/${SYFT_CHECKSUMS}" "/tmp/${SYFT_CHECKSUMS}"
            EXPECTED_SHA256=$(grep "${SYFT_ARCHIVE}" "/tmp/${SYFT_CHECKSUMS}" | awk '{print $1}')
            ./bin/download-and-verify.sh "https://github.com/anchore/syft/releases/download/${SYFT_VERSION}/${SYFT_ARCHIVE}" "/tmp/${SYFT_ARCHIVE}" "${EXPECTED_SHA256}"
            tar xzf "/tmp/${SYFT_ARCHIVE}" syft
            sudo mv syft /usr/local/bin/syft
            rm -f "/tmp/${SYFT_ARCHIVE}" "/tmp/${SYFT_CHECKSUMS}"
            syft version
          environment:
            SYFT_VERSION: "v1.42.3"

      - run:
          name: Install GeoIP2 MaxMindDB
          command: |
            set -euo pipefail
            mkdir -p test/geoip
            cd test/geoip
            if test ! -f "GeoLite2-City.mmdb"; then
              curl -fLu "$MAXMIND_ACCOUNT_ID:$MAXMIND_LICENSE_KEY" "https://download.maxmind.com/geoip/databases/GeoLite2-City/download?suffix=tar.gz" -o GeoLite2-City.tar.gz
              curl -fLu "$MAXMIND_ACCOUNT_ID:$MAXMIND_LICENSE_KEY" "https://download.maxmind.com/geoip/databases/GeoLite2-City/download?suffix=tar.gz.sha256" -o GeoLite2-City.tar.gz.sha256
              # MaxMind's .sha256 file references the dated archive name (e.g. GeoLite2-City_20260331.tar.gz)
              # but we save as GeoLite2-City.tar.gz, so rewrite the filename before verifying
              sed -i 's/  .*/  GeoLite2-City.tar.gz/' GeoLite2-City.tar.gz.sha256
              sha256sum -c GeoLite2-City.tar.gz.sha256
              curl -fLu "$MAXMIND_ACCOUNT_ID:$MAXMIND_LICENSE_KEY" "https://download.maxmind.com/geoip/databases/GeoLite2-Country/download?suffix=tar.gz" -o GeoLite2-Country.tar.gz
              curl -fLu "$MAXMIND_ACCOUNT_ID:$MAXMIND_LICENSE_KEY" "https://download.maxmind.com/geoip/databases/GeoLite2-Country/download?suffix=tar.gz.sha256" -o GeoLite2-Country.tar.gz.sha256
              sed -i 's/  .*/  GeoLite2-Country.tar.gz/' GeoLite2-Country.tar.gz.sha256
              sha256sum -c GeoLite2-Country.tar.gz.sha256
              tar xvzf GeoLite2-City.tar.gz
              tar xvzf GeoLite2-Country.tar.gz
              mv GeoLite2-City_*/GeoLite2-City.mmdb ./
              mv GeoLite2-Country_*/GeoLite2-Country.mmdb ./
            fi

      - save_cache:
          key: mmdb-geoip2
          paths:
            - test/geoip/GeoLite2-City.mmdb
            - test/geoip/GeoLite2-Country.mmdb

      - run:
          name: Cleanup metadata artifacts
          command: rm -rf docs/metadata/* || true

      - run:
          name: Build docker image
          no_output_timeout: 60m
          command: |
            make -j $(nproc) build-$(dpkg --print-architecture)-<< parameters.distro >>
          environment:
            FORCE: "YES"

      - run:
          name: Test image
          command: make -j $(nproc) docker-test-$(dpkg --print-architecture)-<< parameters.distro >>
          environment:
            FORCE: "YES"

      # passing docker images to another job
      - run:
          name: Save image as tar
          command: |
            set -euxo pipefail
            mkdir -p images
            ARCH=$(dpkg --print-architecture)
            IMAGE_ID=$(docker images | grep nginx-lua | grep "<< parameters.distro >>-${ARCH}" | awk '{ print $3 }' | sort | head -n1)
            TAG=$(docker images | grep nginx-lua | grep "<< parameters.distro >>-${ARCH}" | awk '{ print $2 }' | sort | head -n1)
            TAGS=$(docker images | grep "${IMAGE_ID}" | awk '{ print $2 }' | sort)
            echo "${TAGS}" > images/${ARCH}-<< parameters.distro >>_${CIRCLE_SHA1}.txt
            docker image save -o "images/${ARCH}-<< parameters.distro >>_${CIRCLE_SHA1}" "fabiocicerchia/nginx-lua:${TAG}"

      - when:
          condition:
            and:
              - equal: [main, << pipeline.git.branch >>]
          steps:
            - run:
                name: Log into registry
                command: |
                  echo "${DOCKER_HUB_TOKEN}" | docker login --username "${DOCKER_HUB_USER}" --password-stdin
            - run:
                name: Scan for vulnerabilities (build gate)
                command: |
                  set -euo pipefail
                  ARCH=$(dpkg --print-architecture)
                  IMAGE_ID=$(docker images | grep nginx-lua | grep "<< parameters.distro >>-${ARCH}" | awk '{ print $3 }' | sort | head -n1)
                  TAG=$(docker images | grep nginx-lua | grep "<< parameters.distro >>-${ARCH}" | awk '{ print $2 }' | sort | head -n1)
                  make scan-image IMAGE="fabiocicerchia/nginx-lua:${TAG}"
            - run:
                name: Push images (unsigned tags)
                command: |
                  make -j $(nproc) push-<< parameters.distro >>
                environment:
                  FORCE: "YES"
            - run:
                name: Sign images and generate SBOM
                command: |
                  set -euo pipefail
                  declare -A SIGNED_IDS
                  for TAG in $(docker images --format '{{.Repository}}:{{.Tag}}' | grep "fabiocicerchia/nginx-lua" | grep "<< parameters.distro >>" | grep "\-unsigned"); do
                    IMAGE_ID=$(docker inspect --format='{{.Id}}' "$TAG")
                    if [[ -z "${SIGNED_IDS[$IMAGE_ID]+_}" ]]; then
                      SIGNED_IDS[$IMAGE_ID]=1
                      make sign-image IMAGE="${TAG}"
                    else
                      echo "Skipping ${TAG} – digest already signed"
                    fi
                  done
            - run:
                name: Promote signed images to final tags
                command: |
                  make -j $(nproc) promote-<< parameters.distro >>
                environment:
                  FORCE: "YES"
      - persist_to_workspace:
          root: .
          paths:
            - images

  package:
    parameters:
      distro:
        type: string
    steps:
      - checkout

      - attach_workspace:
          at: /tmp/previous-jobs

      - restore_cache:
          keys:
            - mmdb-geoip2

      - run:
          name: Load image
          command: |
            set -euo pipefail
            ARCH=$(dpkg --print-architecture)
            docker image load < "/tmp/previous-jobs/images/${ARCH}-<< parameters.distro >>_${CIRCLE_SHA1}" > loading.txt
            cat loading.txt
            IMAGE_ID=$(grep "Loaded image:" loading.txt | cut -d: -f3)
            echo $IMAGE_ID
            echo "export IMAGE_ID=$IMAGE_ID" >> $BASH_ENV
            while read -r TAG; do
              docker image tag "fabiocicerchia/nginx-lua:$IMAGE_ID" "fabiocicerchia/nginx-lua:$TAG"
            done < "/tmp/previous-jobs/images/${ARCH}-<< parameters.distro >>_${CIRCLE_SHA1}.txt"

            docker images

      - run:
          name: Build packages
          command: |
            make -j $(nproc) package-$(dpkg --print-architecture)-<< parameters.distro >>
            ls -lah dist/nginx-lua*.*

      - run:
          name: Test packages
          command: |
            ls -lah dist/nginx-lua*.*
            make -j $(nproc) package-test-$(dpkg --print-architecture)-<< parameters.distro >>

      - persist_to_workspace:
          root: .
          paths:
            - dist

jobs:
  Docker AMD:
    parameters:
      distro:
        type: string
    machine:
      # https://circleci.com/docs/2.0/configuration-reference/#available-machine-images
      # https://circleci.com/developer/machine/image/ubuntu-2204
      image: ubuntu-2404:2025.09.1
      docker_layer_caching: false
    resource_class: large
    steps:
      - docker:
          distro: << parameters.distro >>

  Docker ARM:
    parameters:
      distro:
        type: string
    machine:
      # https://circleci.com/docs/2.0/configuration-reference/#available-machine-images
      # https://circleci.com/developer/machine/image/ubuntu-2204
      image: ubuntu-2404:2025.09.1
      docker_layer_caching: false
    resource_class: arm.large
    steps:
      - docker:
          distro: << parameters.distro >>

  Package AMD:
    parameters:
      distro:
        type: string
    machine:
      # https://circleci.com/docs/2.0/configuration-reference/#available-machine-images
      # https://circleci.com/developer/machine/image/ubuntu-2204
      image: ubuntu-2404:2025.09.1
      docker_layer_caching: false
    resource_class: large
    steps:
      - package:
          distro: << parameters.distro >>

  Package ARM:
    parameters:
      distro:
        type: string
    machine:
      # https://circleci.com/docs/2.0/configuration-reference/#available-machine-images
      # https://circleci.com/developer/machine/image/ubuntu-2204
      image: ubuntu-2404:2025.09.1
      docker_layer_caching: false
    resource_class: arm.medium
    steps:
      - package:
          distro: << parameters.distro >>

  Docker Bundle:
    parameters:
      distro:
        type: string
    machine:
      # https://circleci.com/docs/2.0/configuration-reference/#available-machine-images
      # https://circleci.com/developer/machine/image/ubuntu-2204
      image: ubuntu-2404:2025.09.1
      docker_layer_caching: false
    steps:
      - checkout

      - attach_workspace:
          at: /tmp/previous-jobs

      - run:
          name: Load image
          command: |
            set -euo pipefail
            ARCH=amd64
            docker image load < "/tmp/previous-jobs/images/${ARCH}-<< parameters.distro >>_${CIRCLE_SHA1}" > loading.txt
            IMAGE_ID=$(grep "Loaded image:" loading.txt | cut -d: -f3)
            while read -r TAG; do
              docker image tag "fabiocicerchia/nginx-lua:$IMAGE_ID" "fabiocicerchia/nginx-lua:$TAG"
            done < "/tmp/previous-jobs/images/${ARCH}-<< parameters.distro >>_${CIRCLE_SHA1}.txt"

            ARCH=arm64
            docker image load < "/tmp/previous-jobs/images/${ARCH}-<< parameters.distro >>_${CIRCLE_SHA1}" > loading.txt
            IMAGE_ID=$(grep "Loaded image:" loading.txt | cut -d: -f3)
            while read -r TAG; do
              docker image tag "fabiocicerchia/nginx-lua:$IMAGE_ID" "fabiocicerchia/nginx-lua:$TAG"
            done < "/tmp/previous-jobs/images/${ARCH}-<< parameters.distro >>_${CIRCLE_SHA1}.txt"

            echo "export IMAGE_ID=$IMAGE_ID" >> "$BASH_ENV"
            docker images

      - run:
          name: Install Python Dependencies
          command: pip3 install -vvv -r bin/requirements.txt

      - run:
          name: Log into registry
          command: |
            echo "${DOCKER_HUB_TOKEN}" | docker login --username "${DOCKER_HUB_USER}" --password-stdin

      - run:
          name: Bundle manifest
          command: |
            make -j $(nproc) bundle-<< parameters.distro >>
          environment:
            FORCE: "YES"

  Metadata:
    machine:
      # https://circleci.com/docs/2.0/configuration-reference/#available-machine-images
      # https://circleci.com/developer/machine/image/ubuntu-2204
      image: ubuntu-2404:2025.09.1
      docker_layer_caching: false
    steps:
      - checkout

      - run:
          name: Push metadata
          command: |
            make auto-commit-metadata

  Release:
    machine:
      # https://circleci.com/docs/2.0/configuration-reference/#available-machine-images
      # https://circleci.com/developer/machine/image/ubuntu-2204
      image: ubuntu-2404:2025.09.1
      docker_layer_caching: false
    steps:
      - checkout

      - attach_workspace:
          at: /tmp/previous-jobs

      - run:
          name: Install Python Dependencies
          command: pip3 install -r bin/requirements.txt

      - run:
          name: Install Skopeo
          command: |
            sudo apt-get install -y --no-install-recommends skopeo
            echo "skopeo version: $(skopeo --version)"

      - run:
          name: Collect packages from previous jobs
          command: |
            mkdir -p dist
            cp -r /tmp/previous-jobs/dist/* ./dist/ 2>/dev/null || true
            echo "=== Release artifacts from build pipeline ==="
            ls -lah dist/ || true

      - run:
          name: Generate Supported Versions and push updates
          command: |
            git pull --ff-only origin main || true
            make auto-update-and-commit || echo "No updates to commit (already up to date)"

      - run:
          name: Create Release
          command: |
            make release
