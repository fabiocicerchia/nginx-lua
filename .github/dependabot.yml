# Dependabot dependency update configuration
# Ref: NIS2 Article 21(2)(d) - supply chain security
# Ref: Cyber Resilience Act Article 47 - SBOM and dependency tracking

version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
    reviewers:
      - "fabiocicerchia"
    commit-message:
      prefix: "docker"

  - package-ecosystem: "docker"
    directory: "/src"
    schedule:
      interval: "daily"
    reviewers:
      - "fabiocicerchia"
    commit-message:
      prefix: "docker"

  - package-ecosystem: "pip"
    directory: "/bin"
    schedule:
      interval: "weekly"
    reviewers:
      - "fabiocicerchia"
    commit-message:
      prefix: "pip"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    reviewers:
      - "fabiocicerchia"
    commit-message:
      prefix: "ci"
